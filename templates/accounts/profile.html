{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}My Profile - Vendora{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    {% if user.profile_image %}
                        <img src="{{ user.profile_image.url }}" class="rounded-circle img-fluid mb-3" style="width: 150px; height: 150px; object-fit: cover;">
                    {% else %}
                        <i class="fas fa-user-circle fa-5x mb-3 text-muted"></i>
                    {% endif %}
                    <h5>{{ user.email }}</h5>
                    <p class="text-muted">Role: {{ user.get_role_display }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-9">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Profile</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
