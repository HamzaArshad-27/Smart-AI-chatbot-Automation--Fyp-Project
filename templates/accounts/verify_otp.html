{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Verify OTP - Vendora{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Verify Your Email</h3>
                </div>
                <div class="card-body">
                    <p>We've sent an OTP to <strong>{{ email }}</strong></p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Verify OTP</button>
                        </div>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        Didn't receive OTP? <a href="{% url 'accounts:register' %}">Resend</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
