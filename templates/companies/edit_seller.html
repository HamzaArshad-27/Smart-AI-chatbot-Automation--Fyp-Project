{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit Seller - {{ company.name }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Seller: {{ seller.user.email }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        {{ form|crispy }}
                        
                        <div class="alert alert-warning">
                            <i class="fas fa-exclamation-triangle"></i> Leave password blank to keep current password.
                        </div>
                        
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Seller
                            </button>
                            <a href="{% url 'companies:manage_sellers' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> Back to Sellers
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
